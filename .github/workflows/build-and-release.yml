name: Build and Release EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-x86]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish single-file app
        run: |
          dotnet restore
          dotnet publish OllamaDesktopChat.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeNativeLibrariesForSelfContained=true -p:DebugType=none -p:DebugSymbols=false

      - name: Rename executable for release
        shell: pwsh
        run: |
          $src = "bin/Release/net8.0-windows/${{ matrix.rid }}/publish/OllamaDesktopChat.exe"
          $dst = "bin/Release/net8.0-windows/${{ matrix.rid }}/publish/OllamaDesktopChat-${{ matrix.rid }}.exe"
          Copy-Item $src $dst -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OllamaDesktopChat-${{ matrix.rid }}
          path: bin/Release/net8.0-windows/${{ matrix.rid }}/publish/OllamaDesktopChat-${{ matrix.rid }}.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: OllamaDesktopChat-win-x64
          path: release-assets

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: OllamaDesktopChat-win-x86
          path: release-assets

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/OllamaDesktopChat-win-x64.exe
            release-assets/OllamaDesktopChat-win-x86.exe
